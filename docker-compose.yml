services:
  minio:
    image: minio/minio:latest
    container_name: minio
    init: true
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - /mnt/drive1/minio-data:/data
      - /mnt/drive1/.rclone-mounted:/mnt-check/.rclone-mounted:ro
    entrypoint:
      - /bin/sh
      - -c
    command:
      - test -f /mnt-check/.rclone-mounted && exec minio server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    init: true
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - /mnt/drive1:/srv
      - filebrowser-db:/database
      - /mnt/drive1/.rclone-mounted:/mnt-check/.rclone-mounted:ro
    environment:
      - FB_DATABASE=/database/filebrowser.db
      - FB_ROOT=/srv
      - FB_LOG=stdout
    entrypoint:
      - /bin/sh
      - -c
    command:
      - test -f /mnt-check/.rclone-mounted && exec filebrowser
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  filebrowser-db:
    driver: local
