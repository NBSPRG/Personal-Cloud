name: Deploy to Azure VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: NBSPRG
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            set -e
            cd /opt/personal-cloud
            git fetch origin main
            git reset --hard origin/main

            echo "MINIO_ROOT_USER=${{ secrets.MINIO_ROOT_USER }}" > .env
            echo "MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD }}" >> .env
            echo "ENABLED_DRIVES=${{ secrets.ENABLED_DRIVES }}" >> .env
            echo "DRIVE1_ENABLED=${{ secrets.DRIVE1_ENABLED }}" >> .env
            echo "DRIVE2_NORMAL_MODE=${{ secrets.DRIVE2_NORMAL_MODE }}" >> .env

            sudo PROJECT_DIR=/opt/personal-cloud bash scripts/ensure-enabled-drives.sh
            sudo PROJECT_DIR=/opt/personal-cloud bash scripts/prepare-drives.sh
            sudo rmdir /mnt/cloud-root/vm-readonly /mnt/cloud-root/vm-space 2>/dev/null || true
            PROJECT_DIR=/opt/personal-cloud bash scripts/generate-drive-compose.sh

            COMPOSE_FILES="-f docker-compose.yml -f docker-compose.generated-drives.yml"

            docker compose $COMPOSE_FILES down --remove-orphans || {
              echo "Compose down failed; restarting Docker to clear stuck containers"
              sudo systemctl restart docker
              sleep 10
              docker compose $COMPOSE_FILES down --remove-orphans || true
            }
            docker compose $COMPOSE_FILES up -d

            sleep 10
            docker exec minio mc alias set local http://localhost:9000 \
              "${{ secrets.MINIO_ROOT_USER }}" "${{ secrets.MINIO_ROOT_PASSWORD }}" 2>/dev/null || true
            docker exec minio mc mb local/uploads --ignore-existing 2>/dev/null || true
            docker exec minio mc mb local/backups --ignore-existing 2>/dev/null || true
            docker exec minio mc mb local/media --ignore-existing 2>/dev/null || true
            docker exec minio mc mb local/assets --ignore-existing 2>/dev/null || true
