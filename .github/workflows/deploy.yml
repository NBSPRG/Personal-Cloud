name: Deploy to Azure VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: NBSPRG
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            set -e
            cd /opt/personal-cloud
            git fetch origin main
            git reset --hard origin/main

            echo "MINIO_ROOT_USER=${{ secrets.MINIO_ROOT_USER }}" > .env
            echo "MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD }}" >> .env

            docker compose down --remove-orphans
            docker compose up -d

            sleep 10
            docker exec minio mc alias set local http://localhost:9000 \
              "${{ secrets.MINIO_ROOT_USER }}" "${{ secrets.MINIO_ROOT_PASSWORD }}" 2>/dev/null || true
            docker exec minio mc mb local/uploads --ignore-existing 2>/dev/null || true
            docker exec minio mc mb local/backups --ignore-existing 2>/dev/null || true
            docker exec minio mc mb local/media --ignore-existing 2>/dev/null || true
            docker exec minio mc mb local/assets --ignore-existing 2>/dev/null || true
